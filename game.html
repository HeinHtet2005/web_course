<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GMT Neon Word Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particles"></canvas>
    
    <button id="back-to-home" class="back-home-btn" title="Back to Home">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>

    <div class="top-right-controls" style="position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1001;">
        <button id="leaderboard-toggle" class="icon-btn" title="Leaderboard">🏆</button>
        <button id="help-btn" class="help-btn">?</button>
    </div>

    <div id="leaderboard-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h3>TOP AGENTS</h3>
            <button id="close-sidebar" class="close-btn">&times;</button>
        </div>
        <div id="leaderboard-list-sidebar">
            </div>
    </div>

    <div id="help-modal" class="modal-overlay">
        <div class="modal-box neon-border">
            <span id="close-help" class="close-btn">&times;</span>
            <h2>HOW TO PLAY</h2>
            <ul class="help-list">
                <li>Guess the <strong>NEON WORD</strong> in 6 tries.</li>
                <li><strong>Pos:</strong> Letters in correct spots.</li>
                <li><strong>Letter:</strong> Right letter, wrong spot.</li>
            </ul>
            <button id="got-it-btn" class="confirm-btn">GOT IT!</button>
        </div>
    </div>

    <div id="win-modal" class="modal-overlay">
        <div class="modal-box neon-border-green">
            <h2 id="win-title">MISSION SUCCESS</h2>
            <p id="win-message">You decoded the word!</p>
            <div style="margin: 20px 0;">
                <h3 id="final-score-display" style="color: #ff00ff;">SCORE: 0</h3>
                <p id="streak-display" style="font-size: 12px; color: #00ff44;">STREAK: 1 DAY</p>
            </div>
            <button id="win-close-btn" class="glow-btn">PLAY AGAIN</button>
        </div>
    </div>

    <div class="game-container">
        <h1 id="welcome-text">WELCOME PLAYER</h1>
        
        <div class="scoreboard-bar">
            <span>BEST: <strong id="high-score-val">0</strong></span>
            <span>STREAK: <strong id="streak-val">0</strong></span>
        </div>

        <div class="guess-box">
            <div id="tile-container">
                <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
            </div>
            <div class="action-buttons" style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                <button id="submit-btn" class="glow-btn">GUESS</button>
                <button id="hint-btn" class="glow-btn" style="border-color: #ff00ff; color: #ff00ff; font-size: 14px;">HINT (-20)</button>
            </div>
        </div>

        <div id="result"></div>
        <div id="history"></div>

        <div id="keyboard">
            <div class="keyboard-row" id="row1"></div>
            <div class="keyboard-row" id="row2"></div>
            <div class="keyboard-row" id="row3"></div>
        </div> 

        <audio id="clickSound" src="click.mp3"></audio>
        <audio id="winSound" src="win.mp3"></audio>
        <audio id="keyboardSound" src="keyboard_typing.mp3"></audio>
        <audio id="bgSound" src="bg_sound.mp3" loop></audio>
        <audio id="bgSound" src="type_sound.mp3" loop></audio>
        <button id="reset-btn" class="danger-glow-btn">RESET GAME</button>
    </div>
   <div id="loading-screen" class="loading" style="display: none;">
        <div class="loader"></div>
        <p>Loading Game...</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
